<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcademiaPro Offline</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --accent: #df481a;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #e2e8f0 0%, var(--bg) 55%);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--ink);
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: min(92vw, 480px);
      background: var(--card);
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.3rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent);
      display: inline-block;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1><span class="dot"></span>AcademiaPro is offline</h1>
    <p>Your internet connection appears unavailable. Reconnect and reload to use AI and cloud features.</p>
  </main>
</body>
</html>
